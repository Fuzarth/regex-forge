services:
  regex-forge:
    image: nginx:alpine
    container_name: regex_forge
    command: /bin/sh -c "sed -i 's/user  nginx;/user root;/' /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    ports:
      - "8109:80"
    volumes:
      - ./app:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
